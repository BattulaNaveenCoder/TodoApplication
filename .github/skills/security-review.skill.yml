name: security-review
description: Auto-trigger guidance for structured security-focused code review.
triggers:
  - "#security-review"
  - "security review"
  - "review for vulnerabilities"
promptFile: .github/prompts/security-review.prompt.md
expectedOutput:
  - Findings grouped by severity
  - File and line references
  - Actionable remediation steps
  - Final PASS or NEEDS WORK verdict
